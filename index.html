<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>유튜브 브랜드 모니터링</title>
<style>
:root {
  --bg-primary: #0f1117;
  --bg-secondary: #1a1d27;
  --bg-card: #222632;
  --bg-card-hover: #2a2e3c;
  --bg-input: #2a2e3c;
  --text-primary: #e8eaed;
  --text-secondary: #9aa0a6;
  --text-muted: #6b7280;
  --accent: #E4002B;
  --accent-light: #ff1a45;
  --accent-bg: rgba(228, 0, 43, 0.12);
  --border: #2e3340;
  --border-light: #3a3f4f;
  --buzz-gray: #6b7280;
  --buzz-yellow: #f59e0b;
  --buzz-orange: #f97316;
  --buzz-red: #ef4444;
  --tier-nano: #9ca3af;
  --tier-micro: #60a5fa;
  --tier-mid: #a78bfa;
  --tier-macro: #f59e0b;
  --tier-mega: #ef4444;
  --verified: #1d9bf0;
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
  --radius: 10px;
  --radius-sm: 6px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
}

a { color: var(--accent-light); text-decoration: none; }
a:hover { text-decoration: underline; }

/* Header */
.header {
  background: linear-gradient(135deg, var(--bg-secondary) 0%, #1e1225 100%);
  border-bottom: 1px solid var(--border);
  padding: 28px 24px 22px;
  text-align: center;
}
.header h1 {
  font-size: 1.7rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.header .subtitle {
  color: var(--text-secondary);
  font-size: 0.92rem;
  margin-top: 6px;
}

/* Container */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 24px 16px 40px;
}

/* Summary cards */
.summary-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 28px;
}
.summary-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 16px;
  text-align: center;
}
.summary-card .label {
  font-size: 0.78rem;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin-bottom: 6px;
}
.summary-card .value {
  font-size: 1.55rem;
  font-weight: 700;
  color: var(--text-primary);
}
.summary-card .value .unit {
  font-size: 0.85rem;
  font-weight: 400;
  color: var(--text-secondary);
  margin-left: 2px;
}

/* Search */
.search-bar {
  margin-bottom: 24px;
}
.search-bar input {
  width: 100%;
  padding: 12px 16px 12px 42px;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-size: 0.95rem;
  outline: none;
  transition: border-color 0.2s;
}
.search-bar input:focus {
  border-color: var(--accent);
}
.search-bar {
  position: relative;
}
.search-bar::before {
  content: '🔍';
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 1rem;
  pointer-events: none;
}

/* Brand section */
.brand-section {
  margin-bottom: 36px;
}
.brand-header {
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
  margin-bottom: 10px;
  padding-bottom: 10px;
  border-bottom: 2px solid var(--accent);
}
.brand-name {
  font-size: 1.35rem;
  font-weight: 700;
}
.brand-stat {
  background: var(--accent-bg);
  color: var(--accent-light);
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 0.8rem;
  font-weight: 600;
}
.brand-tier-badges {
  display: flex;
  gap: 6px;
  margin-left: auto;
}
.brand-tier-badge {
  font-size: 0.72rem;
  padding: 2px 8px;
  border-radius: 12px;
  background: var(--bg-input);
  color: var(--text-secondary);
  border: 1px solid var(--border);
}

/* AI Summary */
.ai-summary {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: var(--radius-sm);
  padding: 16px 18px;
  margin-bottom: 18px;
  font-size: 0.9rem;
  line-height: 1.8;
  color: var(--text-secondary);
  white-space: pre-line;
}
.ai-summary-label {
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--accent-light);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}

/* Video cards */
.video-list {
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.video-card {
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 16px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  transition: background 0.15s, border-color 0.15s;
}
.video-card:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-light);
}
.video-thumb {
  position: relative;
  border-radius: var(--radius-sm);
  overflow: hidden;
  aspect-ratio: 16/9;
}
.video-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.video-thumb .duration-badge {
  position: absolute;
  bottom: 4px;
  right: 4px;
  background: rgba(0,0,0,0.8);
  color: #fff;
  font-size: 0.72rem;
  padding: 1px 5px;
  border-radius: 3px;
  font-weight: 500;
}
.video-thumb .short-badge {
  position: absolute;
  top: 4px;
  left: 4px;
  background: var(--accent);
  color: #fff;
  font-size: 0.65rem;
  padding: 1px 6px;
  border-radius: 3px;
  font-weight: 700;
  text-transform: uppercase;
}
.video-info {
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-width: 0;
}
.video-title {
  font-size: 0.95rem;
  font-weight: 600;
  line-height: 1.4;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.video-title a {
  color: var(--text-primary);
}
.video-title a:hover {
  color: var(--accent-light);
}
.video-channel {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 0.82rem;
  color: var(--text-secondary);
}
.verified-icon {
  color: var(--verified);
  font-size: 0.82rem;
}
.tier-badge {
  display: inline-block;
  font-size: 0.68rem;
  font-weight: 700;
  padding: 1px 7px;
  border-radius: 10px;
  color: #fff;
  line-height: 1.5;
}
.tier-nano { background: var(--tier-nano); }
.tier-micro { background: var(--tier-micro); color: #0c1425; }
.tier-mid { background: var(--tier-mid); color: #1a0e30; }
.tier-macro { background: var(--tier-macro); color: #1a1200; }
.tier-mega { background: var(--tier-mega); }

.video-stats {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  font-size: 0.8rem;
  color: var(--text-secondary);
}
.video-stats .stat {
  display: flex;
  align-items: center;
  gap: 3px;
}
.video-stats .stat-icon {
  font-size: 0.85rem;
}

/* Buzz score */
.buzz-container {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 2px;
}
.buzz-label {
  font-size: 0.75rem;
  color: var(--text-muted);
  min-width: 32px;
}
.buzz-bar-bg {
  flex: 1;
  max-width: 160px;
  height: 6px;
  background: var(--bg-input);
  border-radius: 3px;
  overflow: hidden;
}
.buzz-bar {
  height: 100%;
  border-radius: 3px;
  transition: width 0.3s;
}
.buzz-value {
  font-size: 0.82rem;
  font-weight: 700;
  min-width: 36px;
}

.video-date {
  font-size: 0.75rem;
  color: var(--text-muted);
}

/* Top comments */
.comments-toggle {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-secondary);
  padding: 4px 12px;
  border-radius: 14px;
  font-size: 0.75rem;
  cursor: pointer;
  margin-top: 4px;
  transition: background 0.15s, color 0.15s;
}
.comments-toggle:hover {
  background: var(--bg-input);
  color: var(--text-primary);
}
.comments-list {
  display: none;
  margin-top: 8px;
  padding: 10px 12px;
  background: var(--bg-primary);
  border-radius: var(--radius-sm);
  font-size: 0.82rem;
}
.comments-list.open { display: block; }
.comment-item {
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
}
.comment-item:last-child { border-bottom: none; }
.comment-author {
  color: var(--accent-light);
  font-weight: 600;
  font-size: 0.78rem;
}
.comment-text {
  color: var(--text-secondary);
  margin-top: 2px;
}
.comment-likes {
  color: var(--text-muted);
  font-size: 0.72rem;
  margin-top: 2px;
}

/* Footer */
.footer {
  text-align: center;
  padding: 28px 16px;
  color: var(--text-muted);
  font-size: 0.78rem;
  border-top: 1px solid var(--border);
  margin-top: 20px;
}
.footer .gen-time {
  margin-top: 4px;
  font-size: 0.72rem;
}

/* Loading & Error */
.loading {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-secondary);
}
.loading .spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-msg {
  text-align: center;
  padding: 60px 20px;
  color: var(--buzz-orange);
  font-size: 0.95rem;
}

.no-results {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-muted);
  font-size: 0.9rem;
}

/* Responsive */
@media (max-width: 768px) {
  .summary-row {
    grid-template-columns: repeat(2, 1fr);
  }
  .video-card {
    grid-template-columns: 1fr;
  }
  .video-thumb {
    max-width: 100%;
  }
  .brand-tier-badges {
    margin-left: 0;
  }
  .brand-header {
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
  }
  .header h1 { font-size: 1.3rem; }
  .summary-card .value { font-size: 1.25rem; }
}

@media (max-width: 480px) {
  .summary-row { grid-template-columns: 1fr 1fr; gap: 8px; }
  .container { padding: 14px 10px 30px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>📺 유튜브 브랜드 모니터링</h1>
  <div class="subtitle" id="header-subtitle">데이터 로딩 중...</div>
</div>

<div class="container">
  <div class="summary-row" id="summary-row">
    <div class="summary-card"><div class="label">총 브랜드수</div><div class="value" id="s-brands">-</div></div>
    <div class="summary-card"><div class="label">총 영상수</div><div class="value" id="s-videos">-</div></div>
    <div class="summary-card"><div class="label">총 조회수</div><div class="value" id="s-views">-</div></div>
    <div class="summary-card"><div class="label">기간</div><div class="value" id="s-period">-</div></div>
  </div>

  <div class="search-bar">
    <input type="text" id="search-input" placeholder="영상 제목, 채널명, 설명으로 검색...">
  </div>

  <div id="brands-container">
    <div class="loading"><div class="spinner"></div>데이터를 불러오는 중...</div>
  </div>
</div>

<div class="footer">
  <div>자동 생성 · KFC Korea Digital Tech · 검색엔진 비공개</div>
  <div class="gen-time" id="footer-time"></div>
</div>

<script>
(function() {
  'use strict';

  // Utility functions
  function formatNumber(n) {
    if (n == null) return '-';
    if (n >= 1e8) return (n / 1e8).toFixed(1) + '억';
    if (n >= 1e4) return (n / 1e4).toFixed(1) + '만';
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
    return n.toLocaleString('ko-KR');
  }

  function formatDuration(sec) {
    if (!sec || sec <= 0) return '';
    var h = Math.floor(sec / 3600);
    var m = Math.floor((sec % 3600) / 60);
    var s = sec % 60;
    if (h > 0) return h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
    return m + ':' + String(s).padStart(2,'0');
  }

  function buzzColor(score) {
    if (score >= 70) return 'var(--buzz-red)';
    if (score >= 50) return 'var(--buzz-orange)';
    if (score >= 30) return 'var(--buzz-yellow)';
    return 'var(--buzz-gray)';
  }

  function tierClass(tier) {
    var t = (tier || '').toLowerCase();
    if (t === 'mega') return 'tier-mega';
    if (t === 'macro') return 'tier-macro';
    if (t === 'mid') return 'tier-mid';
    if (t === 'micro') return 'tier-micro';
    return 'tier-nano';
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function renderVideo(v) {
    var thumbUrl = 'https://i.ytimg.com/vi/' + encodeURIComponent(v.video_id) + '/mqdefault.jpg';
    var dur = formatDuration(v.duration);
    var bc = buzzColor(v.buzz_score || 0);
    var pct = Math.min(100, (v.buzz_score || 0));

    var commentsHtml = '';
    if (v.top_comments && v.top_comments.length > 0) {
      var cid = 'c-' + v.video_id;
      commentsHtml = '<button class="comments-toggle" onclick="toggleComments(\'' + cid + '\', this)">💬 댓글 ' + v.top_comments.length + '개 보기</button>';
      commentsHtml += '<div class="comments-list" id="' + cid + '">';
      v.top_comments.forEach(function(c) {
        commentsHtml += '<div class="comment-item">' +
          '<div class="comment-author">' + escapeHtml(c.author) + '</div>' +
          '<div class="comment-text">' + escapeHtml(c.text) + '</div>' +
          (c.likes ? '<div class="comment-likes">👍 ' + c.likes + '</div>' : '') +
          '</div>';
      });
      commentsHtml += '</div>';
    }

    return '<div class="video-card" data-search="' + escapeHtml((v.title + ' ' + v.channel + ' ' + (v.description_excerpt || '')).toLowerCase()) + '">' +
      '<div class="video-thumb">' +
        '<a href="' + escapeHtml(v.url) + '" target="_blank" rel="noopener">' +
          '<img src="' + thumbUrl + '" alt="" loading="lazy">' +
        '</a>' +
        (v.is_short ? '<span class="short-badge">Short</span>' : '') +
        (dur ? '<span class="duration-badge">' + dur + '</span>' : '') +
      '</div>' +
      '<div class="video-info">' +
        '<div class="video-title"><a href="' + escapeHtml(v.url) + '" target="_blank" rel="noopener">' + escapeHtml(v.title) + '</a></div>' +
        '<div class="video-channel">' +
          escapeHtml(v.channel) +
          (v.is_verified ? ' <span class="verified-icon" title="인증됨">✓</span>' : '') +
          ' · 구독자 ' + formatNumber(v.subscribers) +
          ' <span class="tier-badge ' + tierClass(v.creator_tier) + '">' + escapeHtml(v.creator_tier || '') + '</span>' +
        '</div>' +
        '<div class="video-stats">' +
          '<span class="stat"><span class="stat-icon">▶</span> ' + formatNumber(v.views) + '</span>' +
          '<span class="stat"><span class="stat-icon">♡</span> ' + formatNumber(v.likes) + '</span>' +
          '<span class="stat"><span class="stat-icon">💬</span> ' + formatNumber(v.comment_count) + '</span>' +
          (v.engagement_rate != null ? '<span class="stat">참여율 ' + (v.engagement_rate * 100).toFixed(2) + '%</span>' : '') +
        '</div>' +
        '<div class="buzz-container">' +
          '<span class="buzz-label">Buzz</span>' +
          '<div class="buzz-bar-bg"><div class="buzz-bar" style="width:' + pct + '%;background:' + bc + '"></div></div>' +
          '<span class="buzz-value" style="color:' + bc + '">' + (v.buzz_score != null ? v.buzz_score.toFixed(1) : '-') + '</span>' +
        '</div>' +
        '<div class="video-date">📅 ' + escapeHtml(v.upload_date || '') + '</div>' +
        commentsHtml +
      '</div>' +
    '</div>';
  }

  function renderBrand(key, brand) {
    var tierHtml = '';
    if (brand.tier_counts) {
      Object.keys(brand.tier_counts).forEach(function(t) {
        tierHtml += '<span class="brand-tier-badge">' + t + ' ' + brand.tier_counts[t] + '</span>';
      });
    }

    var videos = (brand.videos || []).slice().sort(function(a, b) {
      return (b.buzz_score || 0) - (a.buzz_score || 0);
    });

    var videosHtml = videos.map(renderVideo).join('');

    return '<div class="brand-section" data-brand="' + escapeHtml(key) + '">' +
      '<div class="brand-header">' +
        '<span class="brand-name">' + escapeHtml(brand.display || key) + '</span>' +
        '<span class="brand-stat">영상 ' + (brand.video_count || 0) + '개</span>' +
        '<span class="brand-stat">조회수 ' + formatNumber(brand.total_views) + '</span>' +
        (brand.n_short != null ? '<span class="brand-stat">Short ' + brand.n_short + ' / Long ' + (brand.n_long || 0) + '</span>' : '') +
        '<div class="brand-tier-badges">' + tierHtml + '</div>' +
      '</div>' +
      (brand.summary ? '<div class="ai-summary"><div class="ai-summary-label">🤖 AI 요약</div>' + escapeHtml(brand.summary) + '</div>' : '') +
      '<div class="video-list">' + videosHtml + '</div>' +
    '</div>';
  }

  function render(data) {
    // Header
    document.getElementById('header-subtitle').textContent =
      data.date + ' 기준 · 최근 ' + data.days + '일';

    // Summary
    var brandKeys = Object.keys(data.brands || {});
    var totalVideos = 0, totalViews = 0;
    brandKeys.forEach(function(k) {
      totalVideos += data.brands[k].video_count || 0;
      totalViews += data.brands[k].total_views || 0;
    });
    document.getElementById('s-brands').textContent = brandKeys.length;
    document.getElementById('s-videos').innerHTML = totalVideos + '<span class="unit">개</span>';
    document.getElementById('s-views').textContent = formatNumber(totalViews);
    document.getElementById('s-period').innerHTML = data.days + '<span class="unit">일</span>';

    // Sort brands: KFC first, then by total_views desc
    brandKeys.sort(function(a, b) {
      if (a === 'kfc') return -1;
      if (b === 'kfc') return 1;
      return (data.brands[b].total_views || 0) - (data.brands[a].total_views || 0);
    });

    var html = '';
    brandKeys.forEach(function(k) {
      html += renderBrand(k, data.brands[k]);
    });
    document.getElementById('brands-container').innerHTML = html || '<div class="no-results">브랜드 데이터가 없습니다.</div>';

    // Footer
    if (data.generated_at) {
      document.getElementById('footer-time').textContent = '생성: ' + data.generated_at;
    }
  }

  // Search
  document.getElementById('search-input').addEventListener('input', function() {
    var q = this.value.toLowerCase().trim();
    var cards = document.querySelectorAll('.video-card');
    var brandSections = document.querySelectorAll('.brand-section');
    if (!q) {
      cards.forEach(function(c) { c.style.display = ''; });
      brandSections.forEach(function(s) { s.style.display = ''; });
      return;
    }
    var visibleBrands = {};
    cards.forEach(function(c) {
      var text = c.getAttribute('data-search') || '';
      var match = text.indexOf(q) !== -1;
      c.style.display = match ? '' : 'none';
      if (match) {
        var sec = c.closest('.brand-section');
        if (sec) visibleBrands[sec.getAttribute('data-brand')] = true;
      }
    });
    brandSections.forEach(function(s) {
      s.style.display = visibleBrands[s.getAttribute('data-brand')] ? '' : 'none';
    });
  });

  // Load data
  fetch('./data/latest.json')
    .then(function(res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(render)
    .catch(function(err) {
      document.getElementById('brands-container').innerHTML =
        '<div class="error-msg">⚠️ 데이터 로딩 실패: ' + escapeHtml(err.message) + '<br><small>data/latest.json 파일을 확인하세요.</small></div>';
    });

})();

// Global toggle function for comments
function toggleComments(id, btn) {
  var el = document.getElementById(id);
  if (!el) return;
  var open = el.classList.toggle('open');
  btn.textContent = open ? '💬 댓글 접기' : '💬 댓글 ' + el.children.length + '개 보기';
}
</script>
</body>
</html>
